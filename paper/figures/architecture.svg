<text x="960" y="359.0" font-size="13" font-weight="bold" font-style="normal" text-anchor="middle" fill="#1A1D21" dominant-baseline="central">z<tspan baseline-shift="sub" font-size="0.75em">v</tspan> = γ · z<tspan baseline-shift="sub" font-size="0.75em">mlp</tspan> + (1 - γ) · z<tspan baseline-shift="sub" font-size="0.75em">proto</tspan></text>
<text x="1210" y="335.0" font-size="14" font-weight="bold" font-style="normal" text-anchor="middle" fill="#1F3A5F" dominant-baseline="central">z<tspan baseline-shift="sub" font-size="0.75em">v</tspan></text>
